spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/retotecnico}
    username: ${SPRING_DATASOURCE_USERNAME:reto_user}
    password: ${SPRING_DATASOURCE_PASSWORD:reto_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:reto-tecnico-super-secret-jwt-key-2024-change-in-production}
    expiration: 86400000  # 24 horas en ms

  sendgrid:
    api-key: ${SENDGRID_API_KEY:SG.placeholder}
    from-email: ${SENDGRID_FROM_EMAIL:noreply@retotecnico.com}
    from-name: Reto Técnico

logging:
  level:
    com.reto.tecnico: INFO
    org.springframework.security: WARN
